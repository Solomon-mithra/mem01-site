<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap");
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 1200px; height: 630px; overflow: hidden; background: #000; color: #fff; font-family: "Space Grotesk", system-ui, sans-serif; }
      .frame { position: relative; width: 1200px; height: 630px; overflow: hidden; background: radial-gradient(90% 100% at 95% 0%, rgba(215, 25, 33, .28), transparent 58%), radial-gradient(65% 80% at 0% 100%, rgba(215, 25, 33, .12), transparent 62%), #000; }
      .grid { position: absolute; inset: 0; opacity: .15; background-image: linear-gradient(rgba(255,255,255,.15) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.15) 1px, transparent 1px); background-size: 48px 48px; mask-image: linear-gradient(90deg, transparent, #000 40%, #000); }
      .border { position: absolute; inset: 28px; border: 1px solid rgba(255,255,255,.14); }
      .content { position: relative; display: flex; height: 100%; flex-direction: column; justify-content: space-between; padding: 58px 68px 54px; }
      .top { display: flex; align-items: center; justify-content: space-between; }
      .brand { display: flex; align-items: center; gap: 14px; font-family: "IBM Plex Mono", monospace; font-size: 18px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; }
      .mark { display: flex; width: 44px; height: 44px; align-items: center; justify-content: center; border: 1px solid #333; color: #d71921; font-weight: 700; }
      .pill { border: 1px solid #333; background: rgba(0,0,0,.6); padding: 10px 15px; font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.72); }
      .main { max-width: 1050px; }
      .eyebrow { margin-bottom: 18px; font-family: "IBM Plex Mono", monospace; font-size: 13px; letter-spacing: .18em; text-transform: uppercase; color: #d71921; }
      h1 { max-width: 1050px; font-size: 72px; font-weight: 600; line-height: .98; letter-spacing: -.04em; }
      .code { display: inline-flex; margin-top: 27px; border: 1px solid #333; background: #050505; padding: 15px 19px; font-family: "IBM Plex Mono", monospace; font-size: 18px; color: #d71921; }
      .bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 30px; }
      .note { font-family: "IBM Plex Mono", monospace; font-size: 13px; letter-spacing: .04em; color: rgba(255,255,255,.5); }
      .route { font-family: "IBM Plex Mono", monospace; font-size: 14px; color: rgba(255,255,255,.72); }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="grid"></div><div class="border"></div>
      <div class="content">
        <div class="top"><div class="brand"><div class="mark">01</div>Mem01Session</div><div class="pill">Build Week 2026</div></div>
        <div class="main">
          <p class="eyebrow">The third option for agent memory</p>
          <h1>Session memory for the OpenAI Agents SDK</h1>
          <div class="code">from mem01session import memSession</div>
        </div>
        <div class="bottom"><p class="note">SDK SQLite · embedded mem01 · your Postgres</p><p class="route">mem01 / mem01session</p></div>
      </div>
    </div>
  </body>
</html>
